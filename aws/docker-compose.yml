services:
  # ============================================
  # LLM 개발/서빙 환경 (SSH 접속 → 내부에서 vllm 실행)
  # ============================================
  llm:
    build:
      context: .
      dockerfile: Dockerfile.llm
      args:
        USERNAME: ${USERNAME:-user}
        PASSWORD: ${PASSWORD:-changeme}
        CONTAINER_UID: ${CONTAINER_UID:-1000}
        CONTAINER_GID: ${CONTAINER_GID:-1000}
    image: llm-dev
    container_name: llm-${USERNAME:-user}
    hostname: llm-${USERNAME:-user}
    restart: unless-stopped
    # GPU 컨테이너 호환성을 위해 해제. 프로덕션 시 최소 권한으로 재설정 권장
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    ports:
      - "${LLM_SSH_PORT:-5020}:22"
      - "${LLM_API_PORT:-8000}:8000"
      - "5021-5029:5021-5029"
    volumes:
      - ${VOLUME_PATH:-/volume}/workspace/${USERNAME:-user}:/workspace
      - ${VOLUME_PATH:-/volume}/models:/models
      - ${VOLUME_PATH:-/volume}/data:/data
      - ${VOLUME_PATH:-/volume}/homes/${USERNAME:-user}:/home/${USERNAME:-user}
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - EXTRA_REQUIREMENTS=${EXTRA_REQUIREMENTS:-}
    shm_size: ${SHM_SIZE:-16g}
    deploy:
      resources:
        limits:
          memory: ${LLM_MEMORY:-360g}
        reservations:
          devices:
            - driver: nvidia
              count: ${LLM_GPU_COUNT:-all}
              capabilities: [gpu]

  # ============================================
  # 다중 사용자 예시 (profiles)
