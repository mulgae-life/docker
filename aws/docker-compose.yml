services:
  # ============================================
  # LLM 개발/서빙 환경 (메인 사용자)
  # ============================================
  llm:
    build:
      context: .
      dockerfile: Dockerfile.llm
      args:
        BASE_IMAGE: "${VLLM_IMAGE:?VLLM_IMAGE를 .env에 설정해주세요 (예: vllm/vllm-openai:v0.19.0)}"
        MODE: "${MODE:-dev}"
    image: ${LLM_IMAGE_NAME:-llm-dev}
    container_name: llm-${USERNAME:-user}
    hostname: llm-${USERNAME:-user}
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    ports:
      - "${LLM_SSH_PORT:-5000}:5555"
      # 서비스용 포트 (단일 또는 range, 예: 5031 또는 5001-5009)
      - "${LLM_EXTRA_PORTS:-5001-5009}:${LLM_EXTRA_PORTS:-5001-5009}"
      # code-server 전용 포트 (LLM_EXTRA_PORTS 와 겹치지 않게 지정)
      - "${LLM_CODE_SERVER_PORT:-7777}:${LLM_CODE_SERVER_PORT:-7777}"
    volumes:
      - ${VOLUME_PATH:-/volume}/workspace/${USERNAME:-user}:/workspace
      - ${VOLUME_PATH:-/volume}/models:/models
      - ${VOLUME_PATH:-/volume}/data:/data
      - ${VOLUME_PATH:-/volume}/homes/${USERNAME:-user}:/home/${USERNAME:-user}
      # root 모드 전용 홈 보존 (일반 모드에선 사용 안 됨, 빈 폴더만 생성)
      - ${VOLUME_PATH:-/volume}/root:/root
    environment:
      - MODE=${MODE:-dev}
      - USERNAME=${USERNAME:-user}
      - PASSWORD=${PASSWORD:-changeme}
      - CONTAINER_UID=${CONTAINER_UID:-1000}
      - CONTAINER_GID=${CONTAINER_GID:-1000}
      - HF_TOKEN=${HF_TOKEN:-}
      - EXTRA_REQUIREMENTS=${EXTRA_REQUIREMENTS:-}
      - ASSIGNED_GPUS=${LLM_GPUS:-all}
      # code-server 바인딩 포트 (컨테이너 내부) — 위 ports 매핑 값과 동일해야 외부 접근 가능
      - CODE_SERVER_PORT=${LLM_CODE_SERVER_PORT:-7777}
    shm_size: ${SHM_SIZE:-16g}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${LLM_CODE_SERVER_PORT:-7777}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${LLM_MEMORY:-360g}
        reservations:
          devices:
            - driver: nvidia
              # GPU 접근 활성화. 실제 GPU 필터링은 NVIDIA_VISIBLE_DEVICES 환경변수로 제어
              count: all
              capabilities: [gpu]

  # ============================================
  # 다중 사용자: ./user.sh up <username> 으로 관리
  # ============================================
