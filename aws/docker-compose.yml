services:
  # ============================================
  # LLM 개발/서빙 환경 (메인 사용자)
  # ============================================
  llm:
    build:
      context: .
      dockerfile: Dockerfile.llm
      args:
        BASE_IMAGE: "${VLLM_IMAGE:?VLLM_IMAGE를 .env에 설정해주세요 (예: vllm/vllm-openai:v0.19.1)}"
        MODE: "${MODE:-dev}"
    image: ${LLM_IMAGE_NAME:-llm-dev}
    container_name: llm-${USERNAME:-user}
    hostname: llm-${USERNAME:-user}
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    ports:
      - "${LLM_SSH_PORT:-5000}:5555"
      # 서비스용 포트 (단일 또는 range, 예: 5031 또는 5001-5009)
      - "${LLM_EXTRA_PORTS:-5001-5009}:${LLM_EXTRA_PORTS:-5001-5009}"
    volumes:
      - ${VOLUME_PATH:-/volume}/workspace/${USERNAME:-user}:/workspace
      - ${VOLUME_PATH:-/volume}/models:/models
      - ${VOLUME_PATH:-/volume}/data:/data
      - ${VOLUME_PATH:-/volume}/homes/${USERNAME:-user}:/home/${USERNAME:-user}
      # root 모드 전용 홈 보존 (일반 모드에선 사용 안 됨, 빈 폴더만 생성)
      - ${VOLUME_PATH:-/volume}/root:/root
    environment:
      - MODE=${MODE:-dev}
      - USERNAME=${USERNAME:-user}
      - PASSWORD=${PASSWORD:-changeme}
      - CONTAINER_UID=${CONTAINER_UID:-2000}
      - CONTAINER_GID=${CONTAINER_GID:-2000}
      - HF_TOKEN=${HF_TOKEN:-}
      - EXTRA_REQUIREMENTS=${EXTRA_REQUIREMENTS:-}
      # 컨테이너 디바이스 가시성 제어 (NVIDIA Container Toolkit가 시작 시점에 읽음)
      # — deploy.resources.reservations.devices.count: all 만 두면 모든 GPU가 노출되므로
      #   LLM_GPUS=0,1 같은 부분 제한이 무력화됨. 환경변수로 직접 지정해야 컨테이너 안에서 그 GPU만 보임.
      # — entrypoint의 셸 프로파일 export(ASSIGNED_GPUS)는 셸 환경 일관성용이지 디바이스 노출에 영향 없음.
      - NVIDIA_VISIBLE_DEVICES=${LLM_GPUS:-all}
      - ASSIGNED_GPUS=${LLM_GPUS:-all}
    shm_size: ${SHM_SIZE:-16g}
    deploy:
      resources:
        limits:
          memory: ${LLM_MEMORY:-48g}
        reservations:
          devices:
            - driver: nvidia
              # GPU 접근 활성화. 실제 GPU 필터링은 NVIDIA_VISIBLE_DEVICES 환경변수로 제어
              count: all
              capabilities: [gpu]

  # ============================================
  # 다중 사용자: ./user.sh up <username> 으로 관리
  # ============================================
