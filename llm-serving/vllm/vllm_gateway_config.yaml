# ═══════════════════════════════════════════════════════
# vLLM Gateway 설정
# ═══════════════════════════════════════════════════════
#
# vLLM 인스턴스 앞단의 리버스 프록시(게이트웨이) 설정.
# 로드밸런싱, 헬스체크, 웜업 기능을 제공한다.
#
# 사용법:
#   python vllm_gateway.py
#   python vllm_gateway.py --config vllm_gateway_config.yaml
#
# 구조:
#   클라이언트 → Gateway(:5015) → vLLM(:7070, :7071, ...)
#
# ═══════════════════════════════════════════════════════


# ── vLLM 설정 참조 ──────────────────────────────────
# vllm_config.yaml 경로 (상대 경로 가능).
# 여기서 host와 port(base_port)를 읽어 백엔드 URL을 자동 구성한다.
# → 포트를 vllm_config.yaml 한 곳에서만 관리.
vllm_config: "vllm_config.yaml"

# ── 게이트웨이 서버 ──────────────────────────────────
gateway:
  host: "0.0.0.0"
  port: 5015                # 클라이언트가 접근하는 포트 (방화벽 오픈 대상)
  log_level: "info"             # uvicorn 로그 레벨

# ── 백엔드 vLLM 인스턴스 ─────────────────────────────
# 게이트웨이가 감시할 최대 인스턴스 수.
# 포트는 vllm_config.yaml의 port를 base_port로 자동 할당:
#   :7070, :7071, :7072, ... (base_port + index)
#
# 실제로 띄운 인스턴스만 헬스체크를 통과하여 라우팅 풀에 등록된다.
# 넉넉하게 잡아두면 런처만 띄우면 자동 투입, 죽으면 자동 제외.
# 게이트웨이 재시작 없이 인스턴스를 자유롭게 추가/제거할 수 있다.
backend_count: 8

# ── 헬스체크 ─────────────────────────────────────────
# 백그라운드에서 주기적으로 각 백엔드의 /health를 확인.
# threshold 기반으로 healthy/unhealthy 상태를 판정한다.
health_check:
  interval_seconds: 10          # 폴링 간격
  timeout_seconds: 3            # 개별 요청 타임아웃
  unhealthy_threshold: 3        # 연속 N회 실패 → unhealthy
  healthy_threshold: 1          # 연속 N회 성공 → healthy

# ── 서버 웜업 (CUDA 예열) ────────────────────────────
# 백엔드 기동 감지 시 더미 추론을 보내 CUDA 커널을 예열한다.
# 첫 실제 요청의 지연(cold start)을 제거하는 것이 목적.
# 백엔드 재기동 시에도 웜업을 재실행한다.
warmup:
  enabled: true
  # /health가 200을 반환할 때까지 대기
  boot_poll:
    interval_seconds: 5         # 폴링 간격
    # FP8 27B + TP=2 + cudagraph capture + prefix caching 로딩에
    # 5~8분이 걸리므로 여유 있게 설정. HealthChecker가 주기 감지하므로
    # 게이트웨이가 먼저 떠서 타임아웃이 나더라도 vLLM 기동 후 자동 복구되지만,
    # 타임아웃 로그 자체가 혼란을 주므로 실제 로딩 상한을 커버한다.
    timeout_seconds: 900        # 최대 대기 (모델 로딩 시간 포함)
  # 더미 추론 요청
  inference:
    prompt: "자동차보험 대인배상 담보에 대해 상세히 설명해주세요."
    max_tokens: 256
    timeout_seconds: 120

# ── 프리픽스 캐시 웜업 ───────────────────────────────
# 시스템 프롬프트의 KV 캐시를 사전 적재하여 TTFT를 줄인다.
# vllm_config.yaml의 enable_prefix_caching: true와 함께 동작.
# max_tokens=1로 최소 토큰만 생성 (캐시 적재가 목적).
prefix_cache_warmup:
  enabled: true
  max_tokens: 1
  timeout_seconds: 60
  system_prompt: |
    당신은 한화손해보험의 전문 AI 어시스턴트입니다.
    보험 상품, 담보, 청구 절차 등에 대해 정확하고 친절하게 답변합니다.

# ── HTTP 클라이언트 ──────────────────────────────────
# ── 백엔드 인증 ──────────────────────────────────────
# vLLM에 --api-key를 설정한 경우, 게이트웨이가 내부 요청(웜업, 모델 조회 등)에
# 이 키를 사용한다. 미설정 시 인증 없이 호출.
# backend_api_key: "your-secret-key"

# ── HTTP 클라이언트 ──────────────────────────────────
# 게이트웨이 → 백엔드 요청에 사용하는 httpx 클라이언트 설정.
http_client:
  timeout_seconds: 300          # 추론 요청 전체 타임아웃
  connect_timeout_seconds: 5    # 연결 타임아웃
  max_connections: 100          # 커넥션 풀 크기
